<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening Trainer — TOEIC Part 2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0D0F18;
    --surface:  #161927;
    --card:     #1E2235;
    --border:   #2A2F4A;
    --accent:   #7C6FFF;
    --accent2:  #FF6B8A;
    --green:    #3DFFA0;
    --text:     #E8EAF6;
    --muted:    #7B82A8;
    --radius:   14px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ── */
  header {
    width: 100%;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'DM Serif Display', serif;
    font-size: 18px; color: var(--text);
  }
  .logo-icon {
    width: 34px; height: 34px; border-radius: 10px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
  }
  .total-badge {
    font-size: 12px; color: var(--muted);
    background: var(--card); border: 1px solid var(--border);
    padding: 4px 12px; border-radius: 20px;
  }

  /* ── Main ── */
  main {
    width: 100%; max-width: 560px;
    padding: 28px 16px 60px;
    display: flex; flex-direction: column; gap: 16px;
  }

  /* ── Progress ── */
  .progress-row {
    display: flex; align-items: center; gap: 12px;
  }
  .progress-bar-bg {
    flex: 1; height: 6px; border-radius: 99px;
    background: var(--border); overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%; transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }
  .progress-label { font-size: 13px; color: var(--muted); min-width: 42px; text-align: right; }

  /* ── Badge ── */
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(124,111,255,0.15);
    border: 1px solid rgba(124,111,255,0.35);
    color: #A89CFF;
    font-size: 12px; font-weight: 500;
    padding: 5px 12px; border-radius: 20px;
    width: fit-content;
    transition: all 0.3s;
  }
  .badge-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
  }

  /* ── Card ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card-body {
    padding: 32px 28px;
    min-height: 140px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; gap: 14px;
  }
  #question-text {
    font-family: 'DM Serif Display', serif;
    font-size: 20px; line-height: 1.5;
    color: var(--text);
    transition: all 0.3s;
  }
  #question-text.hint { color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 15px; }
  #meaning-text {
    font-size: 15px; color: var(--green);
    line-height: 1.6; font-style: italic;
    min-height: 0; transition: all 0.3s;
  }
  .card-divider { height: 1px; background: var(--border); margin: 0 20px; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    border: none; cursor: pointer; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    transition: all 0.18s; user-select: none;
  }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-play {
    background: var(--accent); color: #fff;
    padding: 14px 32px; font-size: 15px;
    width: 100%; border-radius: 12px;
  }
  .btn-play:hover:not(:disabled) { background: #6A5EE8; }
  .btn-play.playing { background: #3D3680; }

  .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .btn-secondary {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border);
    padding: 12px 8px;
  }
  .btn-secondary:hover:not(:disabled) { background: var(--border); }

  .btn-next {
    background: var(--accent2); color: #fff;
    padding: 12px 8px;
  }
  .btn-next:hover:not(:disabled) { background: #e55a78; }

  /* ── Shuffle ── */
  .btn-shuffle {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 16px; font-size: 13px; border-radius: 8px;
  }
  .btn-shuffle:hover { background: var(--border); }

  /* ── Start overlay ── */
  #start-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; z-index: 100;
    padding: 24px;
  }
  #start-screen .big-icon { font-size: 56px; line-height: 1; }
  #start-screen h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 30px; text-align: center;
  }
  #start-screen p { color: var(--muted); font-size: 15px; text-align: center; }
  .btn-start {
    background: var(--accent); color: #fff;
    padding: 16px 40px; font-size: 16px; border-radius: 12px;
    margin-top: 8px;
  }
  .btn-start:hover { background: #6A5EE8; }

  /* ── Finish screen ── */
  #finish-msg {
    text-align: center; padding: 20px 0;
    display: none; flex-direction: column; align-items: center; gap: 10px;
  }
  #finish-msg .fin-icon { font-size: 40px; }
  #finish-msg h2 { font-family: 'DM Serif Display', serif; font-size: 22px; }
  #finish-msg p { color: var(--muted); font-size: 14px; }

  /* ── Ripple animation ── */
  @keyframes ripple {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(2.2); opacity: 0; }
  }
  .ripple-wrap { position: relative; }
  .ripple {
    position: absolute; border-radius: 50%;
    background: rgba(124,111,255,0.4);
    animation: ripple 0.6s ease-out forwards;
    pointer-events: none;
  }

  @media (max-width: 480px) {
    #question-text { font-size: 17px; }
    .card-body { padding: 24px 18px; }
    main { padding: 20px 12px 50px; }
  }
</style>
</head>
<body>

<!-- Start screen -->
<div id="start-screen">
  <div class="big-icon">🎧</div>
  <h1>Listening Trainer</h1>
  <p>TOEIC Part 2 — Question Response<br>Random 5 câu từ toàn bộ <strong id="total-count"></strong> câu hỏi</p>
  <button class="btn btn-start" onclick="startGame()">Bắt đầu luyện tập</button>
</div>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">🎧</div>
    Listening Trainer
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="total-badge" id="header-total"></span>
    <button class="btn btn-shuffle" onclick="startGame()">⟳ Shuffle</button>
  </div>
</header>

<main>
  <!-- Progress -->
  <div class="progress-row">
    <div class="progress-bar-bg"><div class="progress-fill" id="prog-fill"></div></div>
    <span class="progress-label" id="prog-label">0 / 5</span>
  </div>

  <!-- Badge -->
  <div><div class="badge" id="badge"><div class="badge-dot"></div><span id="badge-text">—</span></div></div>

  <!-- Card -->
  <div class="card">
    <div class="card-body">
      <p id="question-text" class="hint">Nhấn Shuffle để bắt đầu</p>
      <div class="card-divider" id="card-div" style="display:none;width:100%"></div>
      <p id="meaning-text"></p>
    </div>
  </div>

  <!-- Play -->
  <button class="btn btn-play ripple-wrap" id="btn-play" onclick="playAudio(this)" disabled>
    ▶ &nbsp;Phát Audio
  </button>

  <!-- Actions -->
  <div class="btn-row">
    <button class="btn btn-secondary" id="btn-show-q" onclick="showQuestion()" disabled>👀 Hiện câu</button>
    <button class="btn btn-secondary" id="btn-show-m" onclick="showMeaning()" disabled>📖 Xem nghĩa</button>
    <button class="btn btn-next"      id="btn-next"   onclick="nextQuestion()" disabled>Tiếp →</button>
  </div>

  <!-- Finish -->
  <div id="finish-msg">
    <div class="fin-icon">🎉</div>
    <h2>Hoàn thành!</h2>
    <p>Bạn đã luyện xong 5 câu hỏi.<br>Nhấn Shuffle để tiếp tục.</p>
  </div>
</main>

const allQuestions = [];
for (const [topic, qs] of Object.entries(QUESTIONS_DATA)) {
  for (const q of qs) allQuestions.push({ ...q, topic });
}

document.getElementById('total-count').textContent = allQuestions.length;
document.getElementById('header-total').textContent = allQuestions.length + ' câu';

let session = [], current = 0;
let audio = null;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  session = shuffle(allQuestions).slice(0, 5);
  current = 0;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('finish-msg').style.display = 'none';
  document.getElementById('card-div').style.display = 'none';
  setActionBtns(true);
  loadQuestion();
}

function loadQuestion() {
  const q = session[current];
  const pct = (current / 5) * 100;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = (current + 1) + ' / 5';
  document.getElementById('badge-text').textContent = q.topic + '  •  Câu ' + q.id;
  document.getElementById('question-text').textContent = '🎧  Nghe và đoán câu hỏi...';
  document.getElementById('question-text').className = 'hint';
  document.getElementById('meaning-text').textContent = '';
  document.getElementById('card-div').style.display = 'none';
  document.getElementById('finish-msg').style.display = 'none';
  if (audio) { audio.pause(); audio = null; }
  document.getElementById('btn-play').textContent = '▶  Phát Audio';
  document.getElementById('btn-play').classList.remove('playing');
}

function playAudio(btn) {
  const q = session[current];
  if (audio) { audio.pause(); audio = null; }
  audio = new Audio(q.audio);
  audio.play().catch(() => {});
  btn.textContent = '◉  Đang phát...';
  btn.classList.add('playing');
  audio.onended = () => {
    btn.textContent = '▶  Phát lại';
    btn.classList.remove('playing');
  };
  addRipple(btn);
}

function addRipple(btn) {
  const r = document.createElement('span');
  r.className = 'ripple';
  const s = Math.max(btn.offsetWidth, btn.offsetHeight);
  r.style.cssText = `width:${s}px;height:${s}px;top:50%;left:50%;margin:-${s/2}px 0 0 -${s/2}px`;
  btn.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

function showQuestion() {
  const q = session[current];
  document.getElementById('question-text').textContent = q.question_en;
  document.getElementById('question-text').className = '';
}

function showMeaning() {
  const q = session[current];
  document.getElementById('meaning-text').textContent = q.question_vi;
  document.getElementById('card-div').style.display = 'block';
}

function nextQuestion() {
  current++;
  if (current >= 5) {
    document.getElementById('prog-fill').style.width = '100%';
    document.getElementById('prog-label').textContent = '5 / 5';
    document.getElementById('badge-text').textContent = '✅  Hoàn thành';
    document.getElementById('question-text').textContent = '';
    document.getElementById('question-text').className = '';
    document.getElementById('meaning-text').textContent = '';
    document.getElementById('card-div').style.display = 'none';
    document.getElementById('finish-msg').style.display = 'flex';
    setActionBtns(false);
    if (audio) { audio.pause(); audio = null; }
    return;
  }
  loadQuestion();
}

function setActionBtns(enabled) {
  ['btn-play','btn-show-q','btn-show-m','btn-next'].forEach(id => {
    document.getElementById(id).disabled = !enabled;
  });
}
